name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  validate:
    name: schema + examples + conformance
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jsonschema
        run: |
          python -m pip install --upgrade pip
          python -m pip install "jsonschema>=4.20,<5"

      - name: Run repo validator
        run: python3 tools/validate.py
